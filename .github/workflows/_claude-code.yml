name: Claude Code (Shared)

on:
  workflow_call:
    secrets:
      claude_code_oauth_token:
        description: OAuth token for Claude Code
        required: true

jobs:
  claude:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@0a11a2f11e82bb17da4fe4b21ffff7b219e1e2b5 # v4.2.0

      - name: Install Dev Containers CLI
        run: npm install -g @devcontainers/cli@0.80.2

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@7145c3e0510bcdbdd29f67cc4a8c1958f1acfa2f # v1.0.27
        with:
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          claude_args: |
            --max-turns 50
