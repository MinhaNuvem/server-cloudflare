name: Claude Code (Shared)

on:
  workflow_call:
    secrets:
      claude_code_oauth_token:
        description: OAuth token for Claude Code
        required: true

jobs:
  claude:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@0a11a2f11e82bb17da4fe4b21ffff7b219e1e2b5 # v4.2.0

      - name: Install Dev Containers CLI
        run: npm install -g @devcontainers/cli@0.80.2

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@6337623ebba10cf8c8214b507993f8062fd4ccfb # v1.0.22
        with:
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          claude_args: |
            --max-turns 50
